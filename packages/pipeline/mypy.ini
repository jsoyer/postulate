[mypy]
python_version = 3.9
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True
check_untyped_defs = True
disallow_untyped_defs = False
exclude = tests/
# Pragmatic suppression for Phase 14 expansion — fix incrementally in Phase 15
disable_error_code = union-attr, var-annotated, index, assignment, arg-type, attr-defined, func-returns-value, call-overload
