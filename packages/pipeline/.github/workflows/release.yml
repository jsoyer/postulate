name: 🚀 Release PDFs

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: 📦 Build & Release
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'apply/')
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest

    steps:
      - name: 📥 Checkout apply branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive

      - name: 📦 Install Python dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq python3-pip poppler-utils > /dev/null 2>&1
          pip3 install pyyaml --break-system-packages

      - name: 📋 Parse application info
        id: info
        run: |
          BRANCH="${{ github.head_ref }}"
          NAME="${BRANCH#apply/}"
          TITLE=$(echo "${{ github.event.pull_request.title }}" | sed 's/^📄 //')
          echo "name=$NAME"   >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "tag=release/$NAME" >> "$GITHUB_OUTPUT"

      - name: 🔧 Render YAML → LaTeX
        run: |
          export TEXINPUTS="$(pwd)/awesome-cv/:"
          NAME="${{ steps.info.outputs.name }}"
          APP_DIR="applications/$NAME"

          # Derive filenames from meta.yml (.tex files are gitignored, cannot ls them)
          COMPANY=$(python3 -c "import yaml; d=yaml.safe_load(open('$APP_DIR/meta.yml')); print(d['company'])")
          POSITION=$(python3 -c "import yaml; d=yaml.safe_load(open('$APP_DIR/meta.yml')); print(d['position'])")
          CV_TEX="$APP_DIR/CV - $COMPANY - $POSITION.tex"
          CL_TEX="$APP_DIR/CoverLetter - $COMPANY - $POSITION.tex"

          # Render CV from tailored YAML
          if [ -f "$APP_DIR/cv-tailored.yml" ]; then
            python3 scripts/render.py -d "$APP_DIR/cv-tailored.yml" -o "$CV_TEX"
            echo "✅ Rendered CV: $CV_TEX"
          fi

          # Render Cover Letter from YAML
          if [ -f "$APP_DIR/coverletter.yml" ]; then
            CV_DATA="$APP_DIR/cv-tailored.yml"
            [ -f "$CV_DATA" ] || CV_DATA="data/cv.yml"
            python3 scripts/render.py -d "$APP_DIR/coverletter.yml" -o "$CL_TEX" --cv-data "$CV_DATA"
            echo "✅ Rendered Cover Letter: $CL_TEX"
          fi

      - name: 🔨 Compile PDFs
        run: |
          export TEXINPUTS="$(pwd)/awesome-cv/:"
          NAME="${{ steps.info.outputs.name }}"
          APP_DIR="applications/$NAME"

          for f in "$APP_DIR"/*.tex; do
            [ -f "$f" ] || continue
            echo "Compiling: $(basename "$f")"
            xelatex -output-directory="$APP_DIR" "$f" > /dev/null
          done
          echo "✅ PDFs compiled"

      - name: ✅ Validate page counts
        run: |
          NAME="${{ steps.info.outputs.name }}"
          python3 - <<'EOF'
          import re, sys, glob, os
          name = os.environ.get('NAME') or '${{ steps.info.outputs.name }}'

          def pdf_pages(path):
              with open(path, 'rb') as f:
                  content = f.read()
              m = re.search(rb'/Type\s*/Pages\b[^>]*/Count\s+(\d+)', content)
              return int(m.group(1)) if m else -1

          errors = []
          for pdf in sorted(glob.glob(f'applications/{name}/*.pdf')):
              pages = pdf_pages(pdf)
              fname = os.path.basename(pdf)
              limit = 1 if 'CoverLetter' in fname else 2
              if pages > limit:
                  errors.append(f'  ✗ {fname}: {pages} pages (max {limit})')
              else:
                  print(f'  ✓ {fname}: {pages} page(s)')
          if errors:
              print()
              for e in errors:
                  print(e)
              print()
              print('❌ Page count validation failed — fix content before releasing')
              sys.exit(1)
          print()
          print('✅ All page counts valid')
          EOF
        env:
          NAME: ${{ steps.info.outputs.name }}

      - name: 🔄 Collect & sanitize PDFs for release
        run: |
          NAME="${{ steps.info.outputs.name }}"
          APP_DIR="applications/$NAME"
          mkdir -p /tmp/release-pdfs

          for f in "$APP_DIR"/*.pdf; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .pdf)
            # Only include properly named PDFs (contain " - "), skip intermediates like CoverLetter.pdf
            if echo "$base" | grep -q " - "; then
              clean=$(echo "$base" | sed 's/ - /-/g; s/[, ]//g')
              cp "$f" "/tmp/release-pdfs/$clean.pdf"
              echo "  ✅ $base → $clean.pdf"
            else
              echo "  ⏭  Skipping intermediate: $base.pdf"
            fi
          done

          COUNT=$(ls /tmp/release-pdfs/*.pdf 2>/dev/null | wc -l)
          echo "📦 $COUNT PDF(s) ready for release"
          [ "$COUNT" -gt 0 ] || (echo "❌ No PDFs collected" && exit 1)

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: "📄 ${{ steps.info.outputs.title }}"
          body: |
            Application PDFs for **${{ steps.info.outputs.title }}**.

            PR: ${{ github.event.pull_request.html_url }}
          files: /tmp/release-pdfs/*.pdf
          fail_on_unmatched_files: true
