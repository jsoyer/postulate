name: 🔨 Build PDFs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: 📄 Compile LaTeX
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: texlive/texlive:latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 📦 Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          apt-get update -qq && apt-get install -y -qq python3-pip > /dev/null 2>&1
          pip3 install pyyaml --break-system-packages

      - name: 🔗 Fix fonts (SourceSansPro -> SourceSans3 for TeX Live 2026)
        shell: bash
        run: |
          set -euo pipefail
          # TeX Live 2026 renamed sourcesanspro to sourcesans (SourceSans3-*)
          # Awesome-CV cls references SourceSansPro-* — patch cls to use new names
          if ! fc-list | grep -qi "SourceSansPro"; then
            sed -i 's/SourceSansPro/SourceSans3/g' awesome-cv/awesome-cv.cls
            echo "✅ Patched awesome-cv.cls: SourceSansPro -> SourceSans3"
          else
            echo "✅ SourceSansPro fonts available, no patch needed"
          fi

      - name: 🔧 Render YAML to LaTeX
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/render.py -d data/cv.yml -o CV.tex
          python3 scripts/render.py -d data/coverletter.yml --cv-data data/cv.yml -o CoverLetter.tex

      - name: 🔨 Build master CV & cover letter
        shell: bash
        run: |
          set -euo pipefail
          export TEXINPUTS="$(pwd)/awesome-cv/:"
          xelatex -interaction=nonstopmode -output-directory=. CV.tex
          xelatex -interaction=nonstopmode -output-directory=. CoverLetter.tex

      - name: 🎯 Build all applications
        shell: bash
        run: |
          set -euo pipefail
          export TEXINPUTS="$(pwd)/awesome-cv/:"
          for dir in applications/*/; do
            [ -d "$dir" ] || continue
            echo "Building: $dir"
            for f in "$dir"*.tex; do
              [ -f "$f" ] || continue
              xelatex -interaction=nonstopmode -output-directory="$dir" "$f"
            done
          done

      - name: 🔍 Check for leftover placeholders
        shell: bash
        run: |
          set -euo pipefail
          ERRORS=""
          for f in applications/**/*.tex; do
            [ -f "$f" ] || continue
            basename="$(basename "$f")"
            if echo "$f" | grep -q "applications/"; then
              for pattern in '\[Company\]' '\[Position Title\]' 'Hiring Manager' 'Company Name'; do
                if grep -q "$pattern" "$f"; then
                  ERRORS="${ERRORS}  ✗ $f: contains placeholder '$pattern'\n"
                fi
              done
            fi
          done
          if [ -n "$ERRORS" ]; then
            printf "\n%b\n" "$ERRORS"
            echo "❌ Placeholder check failed — templates not fully tailored"
            exit 1
          else
            echo "✅ No leftover placeholders found"
          fi

      - name: 📝 Spell check
        shell: bash
        run: |
          set -euo pipefail
          apt-get install -y -qq aspell aspell-en > /dev/null 2>&1
          ERRORS=""
          for f in $(find . -name "*.tex" -not -path "./awesome-cv/*"); do
            MISSPELLED=$(cat "$f" \
              | sed 's/\\[a-zA-Z]*{//g; s/[{}\\%$]//g' \
              | aspell --lang=en --personal=./.aspell.en.pws list 2>/dev/null \
              | sort -u) || true
            if [ -n "$MISSPELLED" ]; then
              ERRORS="${ERRORS}  ⚠️  $f: $(echo $MISSPELLED | tr '\n' ', ')\n"
            fi
          done
          if [ -n "$ERRORS" ]; then
            printf "\n📝 Possible misspellings:\n%b\n" "$ERRORS"
            echo "⚠️  Spell check found potential issues (non-blocking)"
          else
            echo "✅ No spelling issues found"
          fi

      - name: ✅ Validate page counts
        run: |
          python3 -c "
          import re, sys, glob

          def pdf_pages(path):
              with open(path, 'rb') as f:
                  content = f.read()
              m = re.search(rb'/Type\s*/Pages\b[^>]*/Count\s+(\d+)', content)
              return int(m.group(1)) if m else -1

          errors = []
          for pdf in sorted(glob.glob('*.pdf') + glob.glob('applications/**/*.pdf', recursive=True)):
              pages = pdf_pages(pdf)
              name = pdf.split('/')[-1]
              if 'CoverLetter' in name and pages > 1:
                  errors.append(f'  ✗ {pdf}: {pages} pages (max 1)')
              elif 'CV' in name and pages > 2:
                  errors.append(f'  ✗ {pdf}: {pages} pages (max 2)')
              else:
                  print(f'  ✓ {pdf}: {pages} page(s)')

          if errors:
              print()
              for e in errors:
                  print(e)
              print()
              print('❌ Page count validation failed')
              sys.exit(1)
          else:
              print()
              print('✅ All page counts valid')
          "

      - name: 📤 Upload master PDFs
        uses: actions/upload-artifact@v4
        with:
          name: master-pdfs
          path: "*.pdf"

      - name: 📤 Upload application PDFs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: application-pdfs
          path: "applications/**/*.pdf"
          if-no-files-found: ignore

  variants:
    name: 📄 Build variants (PDF/A + French)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: texlive/texlive:latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 📦 Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          apt-get update -qq && apt-get install -y -qq python3-pip > /dev/null 2>&1
          pip3 install pyyaml --break-system-packages

      - name: 🔗 Fix fonts (SourceSansPro -> SourceSans3 for TeX Live 2026)
        shell: bash
        run: |
          set -euo pipefail
          # TeX Live 2026 renamed sourcesanspro to sourcesans (SourceSans3-*)
          # Awesome-CV cls references SourceSansPro-* — patch cls to use new names
          if ! fc-list | grep -qi "SourceSansPro"; then
            sed -i 's/SourceSansPro/SourceSans3/g' awesome-cv/awesome-cv.cls
            echo "✅ Patched awesome-cv.cls: SourceSansPro -> SourceSans3"
          else
            echo "✅ SourceSansPro fonts available, no patch needed"
          fi

      - name: 🔒 Build PDF/A variant
        shell: bash
        run: |
          set -euo pipefail
          export TEXINPUTS="$(pwd)/awesome-cv/:"
          python3 scripts/render.py -d data/cv.yml -o CV-pdfa.tex --pdfa
          xelatex -interaction=nonstopmode -output-directory=. CV-pdfa.tex
          if [ -f data/coverletter.yml ]; then
            python3 scripts/render.py -d data/coverletter.yml --cv-data data/cv.yml -o CoverLetter-pdfa.tex --pdfa
            xelatex -interaction=nonstopmode -output-directory=. CoverLetter-pdfa.tex
          fi

      - name: 🌐 Build French variant
        if: hashFiles('data/cv-fr.yml') != ''
        shell: bash
        run: |
          set -euo pipefail
          export TEXINPUTS="$(pwd)/awesome-cv/:"
          python3 scripts/render.py -d data/cv.yml -o CV-fr.tex -l fr
          xelatex -interaction=nonstopmode -output-directory=. CV-fr.tex

      - name: 📤 Upload variant PDFs
        uses: actions/upload-artifact@v4
        with:
          name: variant-pdfs
          path: |
            CV-pdfa.pdf
            CoverLetter-pdfa.pdf
            CV-fr.pdf
          if-no-files-found: ignore
