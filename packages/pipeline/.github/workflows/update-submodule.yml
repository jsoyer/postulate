name: 🔄 Check Awesome-CV Updates

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    name: 🔍 Check for submodule updates
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 🔍 Check for awesome-cv updates
        id: check
        run: |
          cd awesome-cv
          git fetch origin

          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse origin/master 2>/dev/null || git rev-parse origin/main)

          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"

          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "has_update=false" >> "$GITHUB_OUTPUT"
            echo "✅ awesome-cv is up to date"
          else
            echo "has_update=true" >> "$GITHUB_OUTPUT"
            COMMITS=$(git log --oneline "$LOCAL..$REMOTE" | wc -l | tr -d ' ')
            echo "commits=$COMMITS" >> "$GITHUB_OUTPUT"
            echo "🔄 awesome-cv has $COMMITS new commit(s)"
            git log --oneline "$LOCAL..$REMOTE"
          fi

      - name: 📤 Create PR
        if: steps.check.outputs.has_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="deps/update-awesome-cv"
          COMMITS="${{ steps.check.outputs.commits }}"
          REMOTE="${{ steps.check.outputs.remote }}"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Update submodule pointer
          cd awesome-cv && git checkout "$REMOTE" && cd ..
          git add awesome-cv

          # Create or reset branch
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git merge --no-edit origin/main || true
            git add awesome-cv
          else
            git checkout -b "$BRANCH"
          fi

          # Commit only if there are staged changes
          if ! git diff --cached --quiet; then
            git commit -m "deps: update awesome-cv submodule ($COMMITS new commit(s))"
          fi
          git push -u origin "$BRANCH" --force

          # Create or update PR
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            echo "📝 Updated existing PR #$EXISTING_PR"
          else
            printf '## Submodule Update\n\nThe [Awesome-CV](https://github.com/posquit0/Awesome-CV) template has %s new commit(s).\n\n### Action required\n1. Review the changes\n2. Build and verify PDFs still render correctly\n3. Merge if everything looks good\n\n*Auto-generated by CI*\n' "$COMMITS" > /tmp/pr-body.md
            gh pr create \
              --title "🔄 Update Awesome-CV template ($COMMITS new commit(s))" \
              --body-file /tmp/pr-body.md
            echo "📤 Created new PR"
          fi
