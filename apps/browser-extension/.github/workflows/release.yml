name: Release Extension

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build, package, and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package (Chrome + Firefox)
        run: pnpm package

      - name: Create source archive (required by Firefox AMO for minified bundles)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git archive --format=zip HEAD -o "dist/packages/cv-extension-source-v${VERSION}.zip"

      - name: List packages
        run: ls -lh dist/packages/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/packages/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
