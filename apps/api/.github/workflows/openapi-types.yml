name: OpenAPI Types Drift Check

on:
  push:
    paths:
      - 'docs/openapi.yml'
      - 'sdk/typescript/types.gen.ts'
  pull_request:
    paths:
      - 'docs/openapi.yml'
      - 'sdk/typescript/types.gen.ts'

jobs:
  drift-check:
    name: Check TS types are in sync with OpenAPI spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate types from OpenAPI spec
        run: npx --yes openapi-typescript@latest docs/openapi.yml -o sdk/typescript/types.gen.ts

      - name: Fail if generated types differ from committed types
        run: git diff --exit-code sdk/typescript/types.gen.ts
